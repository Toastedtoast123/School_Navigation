<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="room1.css">
    <style>
        .map-container { position: relative; }
    </style>
    <title>Map - School Navigation</title>

</head>
<body>
    <header>
        <nav>
            <div class="container">
                <a href="../../index.html" class="logo"><img id="logo" src="../images/img3.png" alt="error"></a>
                <input type="checkbox" id="menu-toggle">
                <label for="menu-toggle" class="hamburger">☰</label>
                <ul>
                    <li><label for="menu-toggle" class="close-btn">✕</label></li>
                    <li><a href="../../index.html">Home</a></li>
                    <li><a href="#">Rooms</a></li>
                    <li><a href="../contact/contact.html">Contact</a></li>
                </ul>
            </div>
        </nav>
    </header> 
    <section class="rooms-section">
        <div class="rooms-container">
            
            <div class="controls-container">
                <div class="input">
                    <input type="text" id="fromInput" placeholder="Location" list="roomList">
                    <input type="text" id="toInput" placeholder="Destination" list="roomList">
                </div>
                <div class="buttons">
                    <button class="btn" id="searchBtn"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"/></svg></button>
                    <button class="btn" id="reset"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M480-160q-134 0-227-93t-93-227q0-134 93-227t227-93q69 0 132 28.5T720-690v-110h80v280H520v-80h168q-32-56-87.5-88T480-720q-100 0-170 70t-70 170q0 100 70 170t170 70q77 0 139-44t87-116h84q-28 106-114 173t-196 67Z"/></svg></button>
                </div>
                <!-- <div class="info"></div> -->
            </div>
            <div class="room-list" id="room-list">
                <!-- floor buttons injected by ../roomjs/floorButtons.js -->
            </div>
            <div class="map-container">
                <div id="viewer"></div>
                <button id="viewToggle" title="Switch to 2D view">
                  <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M480-80 120-280v-400l360-200 360 200v400L480-80Zm0-446 276-154-276-154-276 154 276 154Zm0 409 280-156v-322L480-439 200-595v322l280 156Zm0-409Zm0 322Zm0 0Z"/></svg>
                </button>
            </div>
        </div>
    </section>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="../roomjs/floorRoutingData.API.js"></script>
    <script src="../roomjs/new.js"></script>
    <script src="../roomjs/floorButtons.js"></script>

</body>
</html>
